name: Publish

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build and pack npm artifact
        run: |
          npm run build:cli
          npm pack --json --ignore-scripts > pack.json

      - name: Resolve package filename
        id: pack
        run: |
          node <<'EOF' >> "$GITHUB_OUTPUT"
          const fs = require('node:fs');
          const [{ filename }] = JSON.parse(fs.readFileSync('pack.json', 'utf8'));
          console.log(`filename=${filename}`);
          EOF

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          PACKAGE_FILE: ${{ steps.pack.outputs.filename }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$PACKAGE_FILE" --clobber
          else
            gh release create "$TAG_NAME" "$PACKAGE_FILE" --generate-notes --verify-tag
          fi

  publish-npm:
    needs: release
    if: ${{ vars.NPM_PUBLISH_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js for npm
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish package to npm
        run: npm publish
